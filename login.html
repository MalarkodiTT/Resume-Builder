<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login | Resume Pro</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #2e3643, #1f2c45); height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-box {color :#f5f0f0; backdrop-filter: blur(10px); padding: 60px; border-radius: 20px; box-shadow: 0 10px 30px rgba(253, 239, 239, 0.3); border: 1px solid rgba(255,255,255,0.2); width: 350px; text-align: center; color: rgb(242, 240, 240); }
        input { width: 100%; padding: 12px; margin: 20px 0; border: none; border-radius: 4px; background: rgba(28, 4, 4, 0.989); color: white; box-sizing: border-box; outline: none; }
        input::placeholder { color: #f7f4f4; font-size: 1.0rem; }
        button { width: 100%; padding: 20px; margin-top: 20px; border: none; border-radius: 8px; background: #00f2fe; color: #020407; font-weight: bold;font-size: 1.0rem; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.03); background: #ecf2f8; font-size: 1.0rem; }
        a { color: #00f2fe; text-decoration: none; font-size: 1.0rem; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>LOGIN</h2>
        <form action="/login" method="POST">
            <input type="email" placeholder="Email Address" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">LOG IN</button>
        </form>
        <p style="font-size: 1.2rem; margin-top: 20px;">New User? <a href="/register">Register Here</a></p>
    </div>
</body>
</html>
